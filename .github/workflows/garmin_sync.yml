name: Garmin → Telegram

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger (use for first run with MFA)
    inputs:
      mfa_code:
        description: 'Garmin MFA code (only needed for first run)'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit state.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore Garmin token cache
        uses: actions/cache@v4
        with:
          path: garmin_tokens
          # New cache key each run so refreshed tokens are always saved
          key: garmin-tokens-${{ github.run_id }}
          restore-keys: |
            garmin-tokens-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        run: python check_new.py
        env:
          GARMIN_EMAIL:         ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:      ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_MFA_CODE:      ${{ inputs.mfa_code }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit updated state.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update sync state [skip ci]"
          git push
